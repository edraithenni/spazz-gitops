apiVersion: apps/v1
kind: Deployment
metadata:
  name: spazz-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: spazz-app
  template:
    metadata:
      labels:
        app: spazz-app
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
      env: 
        - name: DB_TYPE
          value: "postgres"
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: {{ .Values.postgres.user }}
        - name: DB_PASSWD
          value: {{ .Values.postgres.password }}
        - name: DB_NAME
          value: {{ .Values.postgres.database }}

