apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spazz-ingress
  namespace: spazz-test
  annotations:
    cert-manager.io/cluster-issuer: "selfsigned-issuer"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - spazz-app.ddns.net
      secretName: spazz-tls
  rules:
    - host: spazz-app.ddns.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spazz-app
                port:
                  number: 80
